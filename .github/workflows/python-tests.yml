name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Python Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('dist/python/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: dist/python/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('dist/python/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest matplotlib folium numpy

      - name: Build and install package
        run: |
          rm -f dist/python/target/wheels/*.whl  # Linux/macOS
          maturin build --release --manifest-path dist/python/Cargo.toml
          pip install dist/python/target/wheels/*.whl

      - name: Run tests
        run: |
          pytest .github/workflows/tests.py -v